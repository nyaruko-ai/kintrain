version: 1
backend:
  phases:
    build:
      commands:
        - npm install
        - export AGENTCORE_VENDOR_DIR=amplify/agentcore/runtime/vendor
        - rm -rf $AGENTCORE_VENDOR_DIR amplify/agentcore/runtime/__pycache__
        - python3 -m pip install --upgrade pip
        - "python3 -m pip install --upgrade --no-cache-dir --no-compile --only-binary=:all: --platform manylinux2014_aarch64 --implementation cp --python-version 3.12 --abi cp312 --target $AGENTCORE_VENDOR_DIR -r amplify/agentcore/runtime/requirements.txt"
        - npx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
        - npx ampx generate outputs --branch $AWS_BRANCH --app-id $AWS_APP_ID
        - cp amplify_outputs.json frontend/src/amplify_outputs.json
frontend:
  phases:
    preBuild:
      commands:
        - npm --prefix frontend ci
    build:
      commands:
        - npm --prefix frontend run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
      - frontend/node_modules/**/*
